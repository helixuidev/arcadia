name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore HelixUI.sln

      - name: Build (all TFMs)
        run: dotnet build HelixUI.sln --configuration Release --no-restore

      - name: Check docs updated with API changes
        if: github.event_name == 'pull_request'
        run: |
          # If any public API files changed, warn if no doc files changed
          SRC_CHANGED=$(git diff --name-only origin/main...HEAD -- 'src/**/*.cs' 'src/**/*.razor' | head -1)
          DOC_CHANGED=$(git diff --name-only origin/main...HEAD -- 'website/src/pages/docs/**' | head -1)
          if [ -n "$SRC_CHANGED" ] && [ -z "$DOC_CHANGED" ]; then
            echo "::warning::Source files changed but no documentation was updated. Please check if public API docs need updating in website/src/pages/docs/"
          fi

      - name: Run unit tests (excluding performance benchmarks)
        run: dotnet test tests/Arcadia.Tests.Unit/Arcadia.Tests.Unit.csproj --configuration Release --no-build --verbosity normal --filter "Category!=Performance" --logger "trx;LogFileName=unit-results.trx"

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: '**/TestResults/*.trx'

  e2e-tests:
    name: E2E Visual Regression
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build E2E project
        run: dotnet build tests/Arcadia.Tests.E2E/Arcadia.Tests.E2E.csproj --configuration Release

      - name: Install Playwright browsers
        run: pwsh tests/Arcadia.Tests.E2E/bin/Release/net9.0/playwright.ps1 install --with-deps chromium

      - name: Build and start demo server
        run: |
          dotnet build samples/Arcadia.Demo.Server/Arcadia.Demo.Server.csproj --configuration Release --framework net9.0
          ASPNETCORE_URLS=http://localhost:5050 dotnet run --project samples/Arcadia.Demo.Server/Arcadia.Demo.Server.csproj --configuration Release --framework net9.0 --no-build &
          for i in $(seq 1 30); do curl -s http://localhost:5050 > /dev/null && break || sleep 2; done

      - name: Run E2E tests
        # Note: PLAYWRIGHT_BROWSERS_PATH intentionally unset so tests use the default
        # ~/.cache/ms-playwright/ location where the previous step installed browsers.
        # Setting it to 0 would point Playwright at the binary directory, where nothing
        # was installed — resulting in "Executable doesn't exist" errors for all tests.
        run: dotnet test tests/Arcadia.Tests.E2E/Arcadia.Tests.E2E.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=e2e-results.trx" || true
        env:
          UPDATE_SNAPSHOTS: 1

      - name: Upload regenerated baselines
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regenerated-baselines
          path: tests/Arcadia.Tests.E2E/Screenshots/baselines/*.png

      - name: Playground smoke test
        run: |
          npx playwright-core install chromium
          node -e "
          const { chromium } = require('playwright-core');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage({ viewport: { width: 1400, height: 900 } });
            const errors = [];
            page.on('pageerror', e => errors.push(e.message));

            await page.goto('http://localhost:5050/', { timeout: 30000 });
            await new Promise(r => setTimeout(r, 5000));

            // Sidebar visible on desktop
            const sidebar = await page.evaluate(() => document.querySelector('.gallery__sidebar')?.offsetWidth > 50);
            if (!sidebar) { console.error('FAIL: Sidebar not visible on desktop'); process.exit(1); }

            // Mobile bar hidden on desktop
            const mobileHidden = await page.evaluate(() => getComputedStyle(document.querySelector('.gallery__mobile-bar')).display === 'none');
            if (!mobileHidden) { console.error('FAIL: Mobile bar visible on desktop'); process.exit(1); }

            // Click through chart tabs
            const tabs = ['Dashboard Widgets','Line & Area','Bar','Pie & Donut','Scatter','Candlestick','Gauges','Radar'];
            for (const tab of tabs) {
              const btn = page.locator('button:has-text(\"' + tab + '\")').first();
              if (await btn.isVisible({ timeout: 1000 }).catch(() => false)) {
                await btn.click();
                await new Promise(r => setTimeout(r, 1500));
              }
            }

            // Expand and test DataGrid, Forms, UI
            for (const s of ['DATAGRID','FORMS','UI']) {
              const g = page.locator('button:has-text(\"' + s + '\")').first();
              if (await g.isVisible({ timeout: 500 }).catch(() => false)) await g.click();
            }
            await new Promise(r => setTimeout(r, 500));
            for (const tab of ['Dialog / Tabs / Tooltip','Notifications','Field Types']) {
              const btn = page.locator('button:has-text(\"' + tab + '\")').first();
              if (await btn.isVisible({ timeout: 1000 }).catch(() => false)) {
                await btn.click();
                await new Promise(r => setTimeout(r, 1500));
              }
            }

            // Dashboard Grid link
            const dg = page.locator('a:has-text(\"Dashboard Grid\")').first();
            if (await dg.isVisible({ timeout: 1000 }).catch(() => false)) {
              await dg.click();
              await new Promise(r => setTimeout(r, 2000));
              const grid = await page.evaluate(() => document.querySelector('.arcadia-draggrid') !== null);
              if (!grid) { console.error('FAIL: DragGrid not rendered'); process.exit(1); }
              await page.goBack();
            }

            if (errors.length > 0) {
              console.error('JS errors:', errors);
              process.exit(1);
            }

            console.log('Playground smoke test PASSED — all tabs render, no JS errors');
            await browser.close();
          })();
          "

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: '**/TestResults/*.trx'

      - name: Upload screenshot diffs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshot-diffs
          path: '**/TestResults/**/*.png'

  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore HelixUI.sln

      - name: Build Release
        run: dotnet build HelixUI.sln --configuration Release --no-restore

      - name: Pack Arcadia.Core
        run: dotnet pack src/Arcadia.Core/Arcadia.Core.csproj --configuration Release --no-build --output ./nupkgs

      - name: Pack Arcadia.Theme
        run: dotnet pack src/Arcadia.Theme/Arcadia.Theme.csproj --configuration Release --no-build --output ./nupkgs

      - name: Pack Arcadia.Notifications
        run: dotnet pack src/Arcadia.Notifications/Arcadia.Notifications.csproj --configuration Release --no-build --output ./nupkgs

      - name: Pack Arcadia.FormBuilder
        run: dotnet pack src/Arcadia.FormBuilder/Arcadia.FormBuilder.csproj --configuration Release --no-build --output ./nupkgs

      - name: Pack Arcadia.Charts
        run: dotnet pack src/Arcadia.Charts/Arcadia.Charts.csproj --configuration Release --no-build --output ./nupkgs

      - name: Pack Arcadia.DataGrid
        run: dotnet pack src/Arcadia.DataGrid/Arcadia.DataGrid.csproj --configuration Release --no-build --output ./nupkgs

      - name: Pack Arcadia.UI
        run: dotnet pack src/Arcadia.UI/Arcadia.UI.csproj --configuration Release --no-build --output ./nupkgs

      - name: Pack Arcadia.Gauge
        run: dotnet pack src/Arcadia.Gauge/Arcadia.Gauge.csproj --configuration Release --no-build --output ./nupkgs

      - name: Pack Arcadia.DashboardKit
        run: dotnet pack src/Arcadia.DashboardKit/Arcadia.DashboardKit.csproj --configuration Release --no-build --output ./nupkgs

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: ./nupkgs/*.nupkg
